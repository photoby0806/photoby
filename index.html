<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的藝術作品集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 簡約導覽與自我介紹 -->
    <header class="about-section">
        <h1>[Toby LAM]</h1>
        <p class="subtitle">Art & Design Portfolio</p>
        <div class="social-links">
            <a href="#" target="_blank">Instagram</a> / <a href="#" target="_blank">LinkedIn</a>
        </div>
    </header>

    <!-- 核心功能：分類篩選器 -->
    <nav class="filter-menu">
        <button class="filter-btn active" data-target="all">All</button>
        <button class="filter-btn" data-target="painting">Paintings</button>
        <button class="filter-btn" data-target="video">Videos</button>
    </nav>

    <!-- 作品展示區 -->
    <main class="gallery-container">
        <!-- 畫作 1 -->
        <div class="gallery-item" data-category="painting" onclick="openLightbox('image', 'painting1.png')">
        <img src="painting1.png" alt="畫作 1">
        <div class="preview-overlay">🔍 View Painting</div>
        </div>
        
        <!-- 影片 1 -->
        <div class="gallery-item" data-category="video" onclick="openLightbox('video', 'https://www.w3schools.com/html/mov_bbb.mp4')">
            <video src="https://www.w3schools.com/html/mov_bbb.mp4" muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
            <div class="play-icon">▶</div>
            <div class="preview-overlay">▶ Play Video</div>
        </div>

        <!-- 畫作 2 -->
        <div class="gallery-item" data-category="painting" onclick="openLightbox('image', 'https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=800')">
            <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?w=400" alt="畫作 2">
            <div class="preview-overlay">🔍 View Painting</div>
        </div>
    </main>

    <!-- 燈箱結構 -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="close">&times;</span>
        <div id="lightbox-content"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
